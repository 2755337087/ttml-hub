name: Validate and deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Validate lyrics
        run: npm run lyrics:check
      - name: Configure GitHub Pages
        id: pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v6
      - name: Build static site
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ github.event_name == 'pull_request' && '' || steps.pages.outputs.base_path }}
          NEXT_PUBLIC_SITE_URL: ${{ github.event_name == 'pull_request' && 'http://localhost:3000' || steps.pages.outputs.base_url }}
          SOURCE_DATE_EPOCH: ${{ github.event.repository.updated_at }}
        run: npm run build:github
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4
        with:
          path: out

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
