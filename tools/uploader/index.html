<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TTML 本地入库台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <header>
        <div class="brand"><i>T</i><span>TTML HUB</span></div>
        <div class="local"><b></b> LOCAL ONLY · 仅本机可写</div>
      </header>

      <section class="intro">
        <p class="kicker">LOCAL INGEST CONSOLE / 01</p>
        <h1>整批拖入，<br /><em>一次入库。</em></h1>
        <p>批量读取 TTML 头部中的歌名、全部艺术家、专辑、语言、翻译、注音与平台 ID，自动生成稳定路径并检查重复。确认后整批写入，最后只需推送一次。</p>
      </section>

      <section class="workspace">
        <label class="drop" id="drop-zone">
          <input id="file-input" type="file" accept=".ttml,application/xml,text/xml" multiple />
          <span class="drop-icon">↓</span>
          <strong>将一批 TTML 文件拖到这里</strong>
          <small>或点击多选文件 · 单个文件最大 20 MB</small>
        </label>

        <section class="batch" id="batch-panel" hidden>
          <div class="batch-head">
            <div>
              <p>IMPORT QUEUE</p>
              <strong id="batch-count">0 个文件</strong>
            </div>
            <button type="button" id="add-files">＋ 继续添加</button>
          </div>
          <div class="batch-list" id="batch-list"></div>
          <div class="actions">
            <button type="button" class="primary" id="save-button">全部写入歌词库</button>
            <button type="button" class="publish" id="publish-button" disabled>提交并推送 GitHub</button>
          </div>
        </section>
      </section>

      <aside id="notice" aria-live="polite">等待选择 TTML 文件</aside>
      <footer><span>支持批量导入 · 重复默认跳过</span><span>稳定 ID · 自动分片 · 一次推送</span></footer>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
